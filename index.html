<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин мебели</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    header{
      background:#B22222;
      color:white;
      text-align:center;
      padding:20px;
    }

    .products{
      display:flex;
      justify-content:center;
      gap:20px;
      padding:40px;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      width:250px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .card h3{
      margin:15px 0 10px;
    }

    .price{
      font-size:20px;
      margin-bottom:15px;
    }

    button{
      margin-bottom:20px;
      padding:10px 20px;
      border:none;
      background:#B22222;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#6f482d;
    }

    footer{
      background:#222;
      color:white;
      text-align:center;
      padding:15px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Мебель</h1>
    <p>Уютная мебель для вашего дома</p>
  </header>

  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1000&auto=format&fit=crop">
      <h3>Кровать</h3>
      <p class="price">25 000 ₽</p>
      <button>Купить</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?q=80&w=1000&auto=format&fit=crop">
      <h3>Стол  (лампа в подарок)</h3>
      <p class="price">10 000 ₽</p>
      <button>Купить</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1484101403633-562f891dc89a?q=80&w=1000&auto=format&fit=crop">
      <h3>Кресло</h3>
      <p class="price">8 500 ₽</p>
      <button>Купить</button>
    </div>

  </section>
</body>
</html>
